name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'ProxyHat Checker v__VERSION__'
          releaseBody: |
            ## Download

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows 10/11** | `ProxyHat-Checker_*_x64-setup.exe` | Recommended installer |
            | **Windows (alt)** | `ProxyHat-Checker_*_x64_en-US.msi` | MSI installer |
            | **macOS (Apple Silicon)** | `ProxyHat-Checker_*_aarch64.dmg` | M1/M2/M3/M4 Macs |
            | **macOS (Intel)** | `ProxyHat-Checker_*_x64.dmg` | Older Intel Macs |
            | **Linux (Debian/Ubuntu)** | `proxyhat-checker_*_amd64.deb` | `sudo dpkg -i file.deb` |
            | **Linux (universal)** | `proxyhat-checker_*_amd64.AppImage` | Run directly, no install needed |

            > Files ending in `.sig` are update signatures — you don't need to download them manually.

            ---

            [Telegram](https://t.me/ProxyHatCom) · [Website](https://proxyhat.com) · [Report a bug](https://github.com/ProxyHatCom/proxy-checker/issues/new)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
